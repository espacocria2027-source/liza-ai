<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>L.I.Z.A ELITE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN */
#loginBox {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #333;
  color: white;
}

button:hover {
  background: #444;
}

/* CHAT */
#chatBox {
  display: none;
  width: 100%;
  height: 100vh;
  flex-direction: column;
}

header {
  padding: 15px;
  background: #1a1a1a;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 80%;
  white-space: pre-wrap;
}

.user {
  background: #1976d2;
  margin-left: auto;
}

.bot {
  background: #2e7d32;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

#msg {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  outline: none;
}

.sendBtn {
  margin-left: 8px;
  width: 100px;
}

#status {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>🔐 L.I.Z.A LOGIN</h3>

  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Cadastrar</button>

  <p id="status"></p>
</div>

<!-- CHAT -->
<div id="chatBox">

  <header>
    🤖 L.I.Z.A ELITE
    <button onclick="logout()" style="width:auto;padding:8px;">Sair</button>
  </header>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Digite sua mensagem...">
    <button class="sendBtn" onclick="enviar()">Enviar</button>
  </div>

</div>

<script>

let logado = localStorage.getItem("logado") === "true";

/* INIT */
window.onload = () => {
  if (logado) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "flex";
  }
};

/* STATUS */
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

/* REGISTER */
async function register() {

  let usuario = document.getElementById("usuario").value;
  let senha = document.getElementById("senha").value;

  let res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({usuario, senha})
  });

  let data = await res.json();
  setStatus(data.message);
}

/* LOGIN */
async function login() {

  let usuario = document.getElementById("usuario").value;
  let senha = document.getElementById("senha").value;

  let res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({usuario, senha})
  });

  let data = await res.json();

  if (data.success) {

    logado = true;
    localStorage.setItem("logado", "true");
    localStorage.setItem("usuario", usuario);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "flex";

  } else {
    setStatus(data.message);
  }
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("logado");
  localStorage.removeItem("usuario");
  location.reload();
}

/* CHAT */
async function enviar() {

  if (!logado) return;

  let msg = document.getElementById("msg").value;
  if (!msg) return;

  addMsg(msg, "user");
  document.getElementById("msg").value = "";

  try {

    let res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        message: msg,
        usuario: localStorage.getItem("usuario")
      })
    });

    let data = await res.json();
    addMsg(data.text, "bot");

  } catch (e) {
    addMsg("Erro: " + e.message, "bot");
  }
}

/* ENTER TO SEND */
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    enviar();
  }
});

/* ADD MESSAGE */
function addMsg(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
