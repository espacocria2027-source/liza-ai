<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.I.Z.A ELITE V2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
height:100vh;
background:linear-gradient(135deg,#050816,#0b1025,#1b0f35);
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at center,rgba(0,255,255,.12),transparent 60%);
animation:pulse 6s infinite;
pointer-events:none;
}

@keyframes pulse{
50%{transform:scale(1.15)}
}

#loginBox{
width:360px;
background:rgba(10,20,40,.75);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
border:1px solid rgba(0,255,255,.25);
box-shadow:0 0 30px rgba(0,255,255,.2);
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

h3{text-align:center;margin-bottom:15px;color:#9cfaff}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}

button{
cursor:pointer;
border:none;
border-radius:12px;
padding:12px;
color:white;
font-weight:bold;
background:linear-gradient(90deg,#00cfff,#8e24aa);
}

#loginBox button{
width:100%;
margin-top:8px;
}

#chatBox{
display:none;
height:100vh;
flex-direction:column;
}

header{
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:rgba(10,15,30,.8);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(0,255,255,.2);
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#00e5ff,#9c27b0);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
box-shadow:0 0 20px rgba(0,255,255,.4);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:14px;
margin:8px 0;
border-radius:18px;
white-space:pre-wrap;
}

.user{
margin-left:auto;
background:linear-gradient(135deg,#00bcd4,#7b1fa2);
}

.bot{
background:rgba(255,255,255,.08);
border:1px solid rgba(0,255,255,.2);
}

#inputArea{
display:flex;
gap:10px;
padding:15px;
background:rgba(10,15,30,.85);
}

#msg{
margin:0;
flex:1;
}

.sendBtn{
width:120px;
}

.micBtn{
width:60px;
font-size:22px;
}

#status{
margin-top:10px;
text-align:center;
color:#9cfaff;
}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#00cfff;border-radius:20px}
</style>
</head>
<body>

<div id="loginBox">
<h3>✨ L.I.Z.A ELITE</h3>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>

<p id="status"></p>
</div>

<div id="chatBox">

<header>
<div class="logo">
<div class="avatar">🤖</div>
<div>
<div><strong>L.I.Z.A ELITE</strong></div>
<div style="font-size:12px;color:#9cfaff;">Assistente Inteligente</div>
</div>
</div>

<button onclick="logout()" style="width:auto;">Sair</button>
</header>

<div id="chat"></div>

<div id="inputArea">
<button class="micBtn" onclick="microfone()">🎤</button>
<input id="msg" placeholder="Digite sua mensagem...">
<button class="sendBtn" onclick="enviar()">Enviar</button>
</div>

</div>

<script>
let logado = localStorage.getItem("logado") === "true";

window.onload = () => {
if(logado){
document.getElementById("loginBox").style.display="none";
document.getElementById("chatBox").style.display="flex";
}
};

function setStatus(msg){
document.getElementById("status").innerText=msg;
}

async function register(){
let usuario=document.getElementById("usuario").value;
let senha=document.getElementById("senha").value;

let res=await fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario,senha})
});

let data=await res.json();
setStatus(data.message);
}

async function login(){
let usuario=document.getElementById("usuario").value;
let senha=document.getElementById("senha").value;

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario,senha})
});

let data=await res.json();

if(data.success){
logado=true;
localStorage.setItem("logado","true");
localStorage.setItem("usuario",usuario);

document.getElementById("loginBox").style.display="none";
document.getElementById("chatBox").style.display="flex";
}else{
setStatus(data.message);
}
}

function logout(){
localStorage.removeItem("logado");
localStorage.removeItem("usuario");
location.reload();
}

async function enviar(){

if(!logado) return;

let msg=document.getElementById("msg").value;

if(!msg) return;

addMsg(msg,"user");

document.getElementById("msg").value="";

try{

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:msg,
usuario:localStorage.getItem("usuario")
})
});

let data=await res.json();

addMsg(data.text, "bot");

// Solicita o áudio ao backend
const audioResponse = await fetch("/tts", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        text: data.text
    })
});

if (audioResponse.ok) {
    const audioBlob = await audioResponse.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    const audio = new Audio(audioUrl);
    audio.play();

    audio.onended = () => {
        URL.revokeObjectURL(audioUrl);
    };
}

}catch(e){
addMsg("Erro: "+e.message,"bot");
}
}

function microfone(){

const reconhecimento =
new (window.SpeechRecognition ||
window.webkitSpeechRecognition)();

reconhecimento.lang="pt-BR";

reconhecimento.onresult=function(event){

document.getElementById("msg").value =
event.results[0][0].transcript;

enviar();
};

reconhecimento.start();
}

document.addEventListener("keypress",function(e){
if(e.key==="Enter"){
enviar();
}
});

function addMsg(text,type){

let div=document.createElement("div");

div.className="msg "+type;

div.innerText=text;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
